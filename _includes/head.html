<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {%- seo -%}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  <link rel="stylesheet" href="{{ "/assets/css/timeline.css" | relative_url }}">
  <link rel="stylesheet" href="{{ "/assets/css/post-images.css" | relative_url }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ "/assets/img/favicon.png" | relative_url }}">
  {%- feed_meta -%}
  {%- if jekyll.environment == 'production' and site.google_analytics -%}
    {%- include google-analytics.html -%}
  {%- endif -%}
  <style>
    :root {
      --header-h: 56px;       /* actual header height: 54px line-height + 1px border-bottom */
      --header-gap: 48px;     /* breathing room below header */
      scroll-padding-top: calc(var(--header-h) + 46px); /* anchor jumps clear the fixed header */
    }
    /* Sticky site header */
    .site-header {
      position: fixed !important;
      top: 0;
      left: 0;
      right: 0;
      z-index: 500;
      background-color: #fdfdfd;
      border-top: none !important;
    }
    /* Push page content below the fixed header */
    .page-content {
      padding-top: calc(var(--header-h) + var(--header-gap) + 30px) !important;
    }
  </style>
</head>
